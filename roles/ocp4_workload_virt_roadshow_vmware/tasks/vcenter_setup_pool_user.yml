---
- name: Get Pool Folder ID via REST API
  ansible.builtin.uri:
    url: "https://{{ vcenter_hostname }}/api/vcenter/folder?type=VIRTUAL_MACHINE&names={{ ocp4_workload_virt_roadshow_vmware_vcenter_pool_folder }}"
    method: GET
    headers:
      vmware-api-session-id: "{{ _ocp4_workload_virt_roadshow_vmware_token }}"
    validate_certs: "{{ ocp4_workload_virt_roadshow_vmware_enable_cert_validation | bool }}"
    status_code: 200
  register: r_folder_info

- name: Set Pool folder ID fact
  ansible.builtin.set_fact:
    _ocp4_workload_virt_roadshow_vmware_vcenter_pool_folder_id: "{{ r_folder_info.json[0].folder }}"

# yamllint disable rule:line-length
- name: Run playbook on the AD jumphost to create user
  delegate_to: jumphost_ad
  ansible.builtin.command: |
    ansible-playbook
    /home/{{ vmware_ibm_ldap_jumphost_user }}/sandbox_ad_user.yaml
    -e '{"vmware_add_create_user":{"name":"{{ ocp4_workload_virt_roadshow_vmware_vcenter_user }}","firstname":"{{ ocp4_workload_virt_roadshow_vmware_vcenter_user }}","surname":"{{ ocp4_workload_virt_roadshow_vmware_vcenter_user }}","password":"{{ _ocp4_workload_virt_roadshow_vmware_vcenter_user_password }}","group":"{{ ocp4_workload_virt_roadshow_vmware_vcenter_group }}"}}'
  register: r_create_user
# yamllint enable rule:line-length

- name: Grant permissions for pool mode
  block:
    - name: Grant permissions to newly created user to existing VMs
      community.vmware.vmware_object_role_permission:
        validate_certs: "{{ ocp4_workload_virt_roadshow_vmware_enable_cert_validation | bool }}"
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        role: "{{ ocp4_workload_virt_roadshow_vmware_vcenter_pool_role }}"
        principal: "{{ ocp4_workload_virt_roadshow_vmware_vcenter_user }}@{{ vcenter_domain }}"
        recursive: false
        object_name: "{{ vm.name }}-user1"
        object_type: "VirtualMachine"
      until: r_vmware_object_role_permission is success
      retries: 5
      delay: 30
      loop: "{{ ocp4_workload_virt_roadshow_vmware_vms }}"
      loop_control:
        loop_var: vm
        label: "{{ vm.name }}"
      register: r_vmware_object_role_permission

  rescue:
    - name: Create Pool VMs (fallback) via REST API
      ansible.builtin.uri:
        url: "https://{{ vcenter_hostname }}/api/vcenter/vm-template/library-items/{{ (_ocp4_workload_virt_roadshow_vmware_templates | selectattr('name', 'equalto', vm.template + '-l') | first).id }}?action=deploy"
        method: POST
        headers:
          Content-Type: "application/json"
          vmware-api-session-id: "{{ _ocp4_workload_virt_roadshow_vmware_token }}"
        body_format: json
        body:
          name: "{{ vm.name }}-user1"
          placement:
            cluster: "{{ _ocp4_workload_virt_roadshow_vmware_vcenter_cluster_id }}"
            folder: "{{ _ocp4_workload_virt_roadshow_vmware_vcenter_pool_folder_id }}"
          disk_storage:
            datastore: "{{ _ocp4_workload_virt_roadshow_vmware_datastore_id }}"
          powered_on: false
        validate_certs: "{{ ocp4_workload_virt_roadshow_vmware_enable_cert_validation | bool }}"
        status_code: 200
      retries: 5
      delay: 10
      until: r_vmc_instance is success
      loop: "{{ ocp4_workload_virt_roadshow_vmware_vms }}"
      loop_control:
        loop_var: vm
        label: "{{ vm.name }}"
      register: r_vmc_instance

    - name: Grant permissions to newly created user to created VMs
      community.vmware.vmware_object_role_permission:
        validate_certs: "{{ ocp4_workload_virt_roadshow_vmware_enable_cert_validation | bool }}"
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        role: "{{ ocp4_workload_virt_roadshow_vmware_vcenter_pool_role }}"
        principal: "{{ ocp4_workload_virt_roadshow_vmware_vcenter_user }}@{{ vcenter_domain }}"
        recursive: false
        object_name: "{{ vm.name }}-user1"
        object_type: "VirtualMachine"
      register: r_vmware_object_role_permission
      until: r_vmware_object_role_permission is success
      retries: 5
      delay: 5
      loop: "{{ ocp4_workload_virt_roadshow_vmware_vms }}"
      loop_control:
        loop_var: vm
        label: "{{ vm.name }}"
